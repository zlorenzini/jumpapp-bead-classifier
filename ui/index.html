<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bead Classifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:        #0f0f11;
      --surface:   #1a1a1f;
      --border:    #2e2e36;
      --text:      #e8e8ec;
      --muted:     #888;
      --accent:    #5b6af0;
      --accent-hv: #4a59e0;
      --success:   #4caf50;
      --error:     #f44336;
      --warn:      #ff9800;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
    }

    /* ── header ─────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 720px;
      margin-bottom: 1.25rem;
    }
    header h1 { margin: 0 0 0.15rem; font-size: 1.4rem; }
    .status-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--muted); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .dot.ok    { background: var(--success); }
    .dot.error { background: var(--error); }
    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .badge.on { border-color: var(--accent); color: var(--accent); }

    /* ── tabs ────────────────────────────────────────── */
    .tabs {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-btn:hover { color: var(--text); }

    .tab-panel { display: none; width: 100%; max-width: 720px; }
    .tab-panel.active { display: block; }

    /* ── card ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .card-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 1rem; }

    /* ── form controls ───────────────────────────────── */
    label { display: block; margin-bottom: 0.35rem; font-size: 0.82rem; color: var(--muted); }
    .field { margin-bottom: 0.9rem; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      background: #111115;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
    }
    textarea { resize: vertical; min-height: 70px; }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus { outline: none; border-color: var(--accent); }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
    .row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0.75rem; }

    /* ── buttons ─────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.6rem 1.1rem;
      border: none; border-radius: 8px;
      font-size: 0.9rem; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:not(:disabled):hover  { background: var(--accent-hv); }
    .btn-danger   { background: #3b1212; color: #f87171; border: 1px solid #5a1f1f; }
    .btn-danger:not(:disabled):hover   { background: #4e1919; }
    .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover    { color: var(--text); border-color: #555; }
    .btn-full { width: 100%; margin-top: 0.75rem; }

    /* ── camera preview ─────────────────────────────── */
    .cam-wrap {
      position: relative;
      background: #0a0a0c;
      border-radius: 10px;
      overflow: hidden;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cam-wrap img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }
    .cam-overlay {
      position: absolute;
      bottom: 0.5rem;
      right: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .cam-ts {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.55);
      border-radius: 6px;
      padding: 0.15rem 0.45rem;
    }
    .cam-refresh {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      color: rgba(255,255,255,0.7);
      font-size: 0.72rem;
      padding: 0.15rem 0.45rem;
      cursor: pointer;
      line-height: 1;
    }
    .cam-refresh:hover { background: rgba(0,0,0,0.8); color: #fff; }
    .cam-placeholder {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
      padding: 2rem 1rem;
    }
    /* ── drop zone ───────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .drop-zone.drag-over { border-color: var(--accent); background: rgba(91,106,240,0.06); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .drop-zone img { max-height: 220px; max-width: 100%; border-radius: 8px; margin-top: 0.75rem; }
    .drop-hint { pointer-events: none; }

    /* ── results ─────────────────────────────────────── */
    .match-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .match-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: #111115; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.6rem 0.85rem;
    }
    .match-rank { font-size: 0.75rem; color: var(--muted); width: 1.2rem; flex-shrink: 0; }
    .match-info { flex: 1; min-width: 0; }
    .match-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .match-id   { font-size: 0.74rem; color: var(--muted); font-family: monospace; }
    .match-bar-wrap { width: 90px; flex-shrink: 0; }
    .match-bar-bg { background: var(--border); border-radius: 999px; height: 5px; overflow: hidden; }
    .match-bar-fill { height: 100%; border-radius: 999px; background: var(--accent); }
    .match-score { font-size: 0.78rem; color: var(--muted); text-align: right; }

    .empty-state { text-align: center; color: var(--muted); font-size: 0.875rem; padding: 1.5rem 0; }

    /* ── shopify section ─────────────────────────────── */
    .shopify-row { display: grid; grid-template-columns: 1fr auto; gap: 0.75rem; align-items: end; }

    /* ── library table ───────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.5rem 0.6rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
    td { padding: 0.55rem 0.6rem; border-bottom: 1px solid #1e1e25; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .pill {
      display: inline-block; background: #1e1e30; border: 1px solid #2e2e50;
      border-radius: 999px; padding: 0 0.45rem; font-size: 0.72rem;
      color: #8888cc; margin: 1px;
    }
    .ref-count { font-size: 0.75rem; color: var(--muted); }

    /* ── toast ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #1e1e2a; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.6rem 1.1rem;
      font-size: 0.85rem; color: var(--text);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
      z-index: 9999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    #toast.ok   { border-color: var(--success); color: var(--success); }
    #toast.err  { border-color: var(--error);   color: var(--error);   }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────── -->
  <header>
    <h1>Bead Classifier</h1>
    <div class="status-row">
      <span class="dot" id="srv-dot"></span>
      <span id="srv-text">connecting…</span>
      <span class="badge" id="badge-db">DB –</span>
      <span class="badge" id="badge-shopify">Shopify –</span>
      <span class="badge" id="badge-beads">0 beads</span>
    </div>
  </header>

  <!-- ── Tabs ───────────────────────────────────── -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="classify">Classify</button>
    <button class="tab-btn"        data-tab="train">Train</button>
    <button class="tab-btn"        data-tab="library">Library</button>
  </div>

  <!-- ══════════════════════════════════════════════
       TAB: Classify
       ══════════════════════════════════════════════ -->
  <div class="tab-panel active" id="tab-classify">

    <div class="card">
      <p class="card-title">Camera</p>
      <div class="cam-wrap" id="cam-wrap">
        <div class="cam-placeholder" id="cam-placeholder">📷 Loading camera…</div>
        <img id="cam-img" style="display:none" alt="camera preview" />
        <div class="cam-overlay">
          <span class="cam-ts" id="cam-ts" style="display:none"></span>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="classify-cam-btn"
        style="margin-top:0.75rem" disabled>Classify this frame</button>
    </div>

    <div class="card">
      <p class="card-title">Or upload an image</p>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="infer-file" accept="image/*" />
        <div class="drop-hint" id="drop-hint">
          Drop image here or <strong>click to browse</strong><br />
          <span style="font-size:0.78rem">JPEG · PNG · WebP</span>
        </div>
        <img id="infer-preview" style="display:none" alt="preview" />
      </div>
      <button class="btn btn-primary btn-full" id="infer-btn" disabled>
        Run inference
      </button>
    </div>

    <div class="card" id="results-card" style="display:none">
      <p class="card-title">Matched beads</p>
      <div class="match-list" id="match-list"></div>
    </div>

    <div class="card" id="shopify-card" style="display:none">
      <p class="card-title">Push to Shopify</p>
      <div class="shopify-row">
        <div class="field" style="margin:0">
          <label for="product-id">Shopify product ID</label>
          <input type="text" id="product-id" placeholder="e.g. 8419827482736" />
        </div>
        <button class="btn btn-primary" id="push-btn">Push tags</button>
      </div>
      <div style="margin-top:0.6rem; font-size:0.8rem; color:var(--muted)" id="push-result"></div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════
       TAB: Train
       ══════════════════════════════════════════════ -->
  <div class="tab-panel" id="tab-train">

    <div class="card">
      <p class="card-title">Add reference bead</p>

      <!-- Identity -->
      <div class="row-2">
        <div class="field">
          <label>SKU <span style="color:#888">(unique key)</span></label>
          <input type="text" id="t-sku" placeholder="GS-10-HEX" />
        </div>
        <div class="field">
          <label>Name</label>
          <input type="text" id="t-name" placeholder="Green Silicone 10mm Hexagon" />
        </div>
      </div>

      <!-- Material -->
      <div class="row-2">
        <div class="field">
          <label>Material category</label>
          <select id="t-material-category">
            <option value="">-- select --</option>
            <option>silicone</option>
            <option>glass</option>
            <option>acrylic</option>
            <option>metal</option>
            <option>ceramic</option>
            <option>wood</option>
            <option>gemstone</option>
            <option>organic</option>
            <option>resin</option>
            <option>rhinestone</option>
            <option>fabric</option>
            <option>other</option>
          </select>
        </div>
        <div class="field">
          <label>Material <span style="color:#888">(sub-type)</span></label>
          <input type="text" id="t-material" placeholder="e.g. czech glass, sterling silver" />
        </div>
      </div>

      <!-- Shape / Size / Hole -->
      <div class="row-3">
        <div class="field">
          <label>Shape</label>
          <select id="t-shape">
            <option value="">-- select --</option>
            <option>round</option>
            <option>oval</option>
            <option>hexagon</option>
            <option>tube</option>
            <option>flat</option>
            <option>bicone</option>
            <option>rondelle</option>
            <option>faceted</option>
            <option>drop</option>
            <option>cube</option>
            <option>heart</option>
            <option>star</option>
            <option>letter</option>
            <option>barrel</option>
            <option>nugget</option>
            <option>coin</option>
            <option>other</option>
          </select>
        </div>
        <div class="field">
          <label>Size (mm)</label>
          <input type="number" id="t-size-mm" placeholder="10" min="0" step="0.5" />
        </div>
        <div class="field">
          <label>Hole type</label>
          <select id="t-hole-type">
            <option value="">-- select --</option>
            <option value="center-drilled">center-drilled</option>
            <option value="large-hole">large-hole</option>
            <option value="top-drilled">top-drilled</option>
            <option value="side-drilled">side-drilled</option>
          </select>
        </div>
      </div>

      <!-- Colour -->
      <div class="row-2">
        <div class="field">
          <label>Color <span style="color:#888">(specific name)</span></label>
          <input type="text" id="t-color" placeholder="dusty rose, cobalt blue…" />
        </div>
        <div class="field">
          <label>Color family</label>
          <select id="t-color-family">
            <option value="">-- select --</option>
            <option>red</option>
            <option>orange</option>
            <option>yellow</option>
            <option>green</option>
            <option>blue</option>
            <option>purple</option>
            <option>pink</option>
            <option>brown</option>
            <option>white</option>
            <option>black</option>
            <option>gray</option>
            <option>gold</option>
            <option>silver</option>
            <option>multicolor</option>
          </select>
        </div>
      </div>

      <!-- Finish -->
      <div class="field">
        <label>Finish</label>
        <select id="t-finish">
          <option value="">-- select --</option>
          <option>glossy</option>
          <option>matte</option>
          <option>transparent</option>
          <option>frosted</option>
          <option>metallic</option>
          <option>iridescent</option>
          <option>pearlized</option>
          <option>crackle</option>
          <option>painted</option>
          <option>etched</option>
          <option>glow</option>
          <option value="uv-reactive">uv-reactive</option>
          <option>other</option>
        </select>
      </div>

      <!-- Source / Cost -->
      <div class="row-2">
        <div class="field">
          <label>Source / Vendor</label>
          <input type="text" id="t-source" placeholder="Temu, Amazon, Etsy…" />
        </div>
        <div class="field">
          <label>Cost per unit ($)</label>
          <input type="number" id="t-cost" placeholder="0.00" min="0" step="0.01" />
        </div>
      </div>

      <!-- Tags -->
      <div class="field">
        <label>Tags <span style="color:#888">(comma-separated)</span></label>
        <input type="text" id="t-tags" placeholder="silicone, hexagon, dusty rose" />
      </div>

      <!-- Focal bead toggle -->
      <div class="field">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;color:var(--text)">
          <input type="checkbox" id="t-focal-bead" style="width:auto;accent-color:var(--accent)" />
          Focal bead <span style="color:#888;font-size:0.8rem">(character, animal, or saying)</span>
        </label>
      </div>

      <div id="focal-extra-fields" style="display:none">
        <div class="row-2">
          <div class="field">
            <label>Subject <span style="color:#888">(character / saying name)</span></label>
            <input type="text" id="t-focal-subject" placeholder="Stitch, Highland Cow, Mama Bear…" />
          </div>
          <div class="field" style="display:flex;align-items:center;padding-top:1.6rem">
            <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;color:var(--text);margin:0">
              <input type="checkbox" id="t-is-3d" style="width:auto;accent-color:var(--accent)" />
              3-D figurine
              <span style="color:#888;font-size:0.78rem">(unchecked = 2-D flat, ~6–8 mm thick)</span>
            </label>
          </div>
        </div>
        <div class="field">
          <label>Focal description <span style="color:#888">(pose, colours, variant…)</span></label>
          <textarea id="t-focal-desc" placeholder="e.g. Blue alien wearing a Santa hat, seated, painted details"></textarea>
        </div>
      </div>

      <!-- Image -->
      <div class="field">
        <label>Reference image</label>
        <div class="drop-zone" id="train-drop">
          <input type="file" id="train-file" accept="image/*" />
          <div class="drop-hint" id="train-hint">Drop image or <strong>click to browse</strong></div>
          <img id="train-preview" style="display:none" alt="reference" />
        </div>
        <button class="btn btn-ghost" id="train-capture-btn"
          style="width:100%;margin-top:0.5rem">📷 Capture from camera</button>
      </div>

      <button class="btn btn-primary btn-full" id="train-btn">Save to data lake</button>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════
       TAB: Library
       ══════════════════════════════════════════════ -->
  <div class="tab-panel" id="tab-library">

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <p class="card-title" style="margin:0">Data lake</p>
        <button class="btn btn-ghost" style="font-size:0.8rem;padding:0.35rem 0.75rem" id="refresh-lib">Refresh</button>
      </div>
      <div id="lib-body">
        <p class="empty-state">Loading…</p>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    // ── API base — same origin when served by FastAPI, override with ?port= ──
    const params  = new URLSearchParams(window.location.search);
    const BASE    = params.get("port")
                  ? `${window.location.protocol}//${window.location.hostname}:${params.get("port")}`
                  : window.location.origin;

    // ── Tabs ───────────────────────────────────────────────────────────────
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
        if (btn.dataset.tab === "library") refreshLibrary();
      });
    });

    // ── Toast ──────────────────────────────────────────────────────────────
    let toastTimer;
    function toast(msg, type = "ok") {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className  = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ""; }, 3200);
    }

    // ── Status polling ─────────────────────────────────────────────────────
    async function checkStatus() {
      try {
        const r    = await fetch(`${BASE}/status`);
        const data = await r.json();
        const dot  = document.getElementById("srv-dot");
        dot.className = "dot ok";
        document.getElementById("srv-text").textContent =
          `server ok · v${data.version ?? "?"}`;

        const db = document.getElementById("badge-db");
        db.textContent = data.db_connected ? "DB ✓" : "DB ✗";
        db.className   = `badge ${data.db_connected ? "on" : ""}`;

        const sh = document.getElementById("badge-shopify");
        sh.textContent = data.shopify_configured ? "Shopify ✓" : "Shopify –";
        sh.className   = `badge ${data.shopify_configured ? "on" : ""}`;

        document.getElementById("badge-beads").textContent =
          `${data.bead_count ?? 0} bead${data.bead_count === 1 ? "" : "s"}`;

        document.getElementById("infer-btn").disabled =
          !document.getElementById("infer-preview").src || !data.db_connected;
      } catch {
        document.getElementById("srv-dot").className  = "dot error";
        document.getElementById("srv-text").textContent = "server unreachable";
        document.getElementById("infer-btn").disabled = true;
      }
    }

    checkStatus();
    setInterval(checkStatus, 10_000);

    // ── Drop zone helper ───────────────────────────────────────────────────
    function setupDrop(zoneId, inputId, previewId, hintId, onFile) {
      const zone    = document.getElementById(zoneId);
      const input   = document.getElementById(inputId);
      const preview = document.getElementById(previewId);
      const hint    = document.getElementById(hintId);

      function handleFile(file) {
        if (!file || !file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = e => {
          preview.src  = e.target.result;
          preview.style.display = "block";
          hint.style.display    = "none";
        };
        reader.readAsDataURL(file);
        if (onFile) onFile(file);
      }

      input.addEventListener("change", () => handleFile(input.files[0]));
      zone.addEventListener("dragover",  e => { e.preventDefault(); zone.classList.add("drag-over"); });
      zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
      zone.addEventListener("drop", e => {
        e.preventDefault();
        zone.classList.remove("drag-over");
        handleFile(e.dataTransfer.files[0]);
      });
    }

    // ── Focal bead toggle ──────────────────────────────────────────────────
    document.getElementById("t-focal-bead").addEventListener("change", e => {
      document.getElementById("focal-extra-fields").style.display = e.target.checked ? "block" : "none";
      if (!e.target.checked) document.getElementById("t-is-3d").checked = false;
    });

    setupDrop("drop-zone", "infer-file", "infer-preview", "drop-hint", () => {
      checkStatus();   // update btn state after image selected
      document.getElementById("infer-btn").disabled = false;
    });
    setupDrop("train-drop", "train-file", "train-preview", "train-hint");

    // ── Camera live preview (1s between frames) ──────────────────────────
    let lastFrameB64  = null;
    let lastFrameMime = "image/jpeg";
    let camRunning    = true;

    async function fetchPreview() {
      const img         = document.getElementById("cam-img");
      const placeholder = document.getElementById("cam-placeholder");
      const tsEl        = document.getElementById("cam-ts");
      const classifyBtn = document.getElementById("classify-cam-btn");

      try {
        const r = await fetch(`${BASE}/preview`);
        if (!r.ok) throw new Error((await r.json()).detail ?? r.statusText);
        const data = await r.json();

        lastFrameB64  = data.image_b64;
        lastFrameMime = data.mime_type ?? "image/jpeg";

        img.src = `data:${lastFrameMime};base64,${lastFrameB64}`;
        img.style.display         = "block";
        placeholder.style.display = "none";
        tsEl.textContent          = new Date().toLocaleTimeString();
        tsEl.style.display        = "inline";
        classifyBtn.disabled      = false;
      } catch (err) {
        placeholder.textContent   = `Camera unavailable: ${err.message}`;
        placeholder.style.display = "block";
        img.style.display         = "none";
        classifyBtn.disabled      = true;
      }

      if (camRunning) setTimeout(fetchPreview, 1000);
    }

    fetchPreview();

    // "Classify this frame" — run inference on the current preview image
    document.getElementById("classify-cam-btn").addEventListener("click", async () => {
      if (!lastFrameB64) return;
      const btn = document.getElementById("classify-cam-btn");
      btn.disabled = true;
      btn.textContent = "Classifying…";

      // Mirror the preview into the upload drop-zone so the user sees context
      const inline = document.getElementById("infer-preview");
      const hint   = document.getElementById("drop-hint");
      inline.src = `data:${lastFrameMime};base64,${lastFrameB64}`;
      inline.style.display = "block";
      hint.style.display   = "none";

      try {
        const r = await fetch(`${BASE}/capture`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail ?? r.statusText); }
        const data = await r.json();

        lastMatches = data.matches ?? [];
        renderMatches(lastMatches);
        document.getElementById("results-card").style.display = "block";
        document.getElementById("shopify-card").style.display =
          lastMatches.length ? "block" : "none";
        if (data.latency_ms != null)
          toast(`${lastMatches.length} match(es) · ${data.latency_ms} ms`);
      } catch (err) {
        toast(`Classify failed: ${err.message}`, "err");
      } finally {
        btn.disabled = false;
        btn.textContent = "Classify this frame";
      }
    });

    // ── Classify ───────────────────────────────────────────────────────────
    let lastMatches       = [];
    let capturedTrainB64  = null;
    let capturedTrainMime = "image/jpeg";

    // ── Capture for Train ────────────────────────────────────────────────
    document.getElementById("train-capture-btn").addEventListener("click", async () => {
      const btn = document.getElementById("train-capture-btn");
      btn.disabled = true;
      btn.textContent = "Capturing…";

      try {
        const r = await fetch(`${BASE}/capture`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail ?? r.statusText); }
        const data = await r.json();

        capturedTrainB64  = data.image_b64;
        capturedTrainMime = data.mime_type ?? "image/jpeg";

        // Show in preview
        const preview = document.getElementById("train-preview");
        const hint    = document.getElementById("train-hint");
        preview.src = `data:${capturedTrainMime};base64,${capturedTrainB64}`;
        preview.style.display = "block";
        hint.style.display    = "none";
        // Clear any manually selected file so capturedTrainB64 takes precedence
        document.getElementById("train-file").value = "";
        toast("Frame captured ✓");
      } catch (err) {
        toast(`Capture failed: ${err.message}`, "err");
      } finally {
        btn.disabled = false;
        btn.textContent = "📷 Capture from camera";
      }
    });

    document.getElementById("infer-btn").addEventListener("click", async () => {
      const fileInput = document.getElementById("infer-file");
      if (!fileInput.files[0]) return;

      const btn = document.getElementById("infer-btn");
      btn.disabled = true;
      btn.textContent = "Analysing…";

      try {
        const fd = new FormData();
        fd.append("image", fileInput.files[0]);

        const r = await fetch(`${BASE}/infer`, { method: "POST", body: fd });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail ?? r.statusText); }
        const data = await r.json();

        lastMatches = data.matches ?? [];
        renderMatches(lastMatches);

        document.getElementById("results-card").style.display = "block";
        document.getElementById("shopify-card").style.display =
          lastMatches.length ? "block" : "none";
      } catch (err) {
        toast(`Inference failed: ${err.message}`, "err");
      } finally {
        btn.disabled = false;
        btn.textContent = "Run inference";
      }
    });

    function renderMatches(matches) {
      const list = document.getElementById("match-list");
      if (!matches.length) {
        list.innerHTML = `<p class="empty-state">No matches above confidence threshold.</p>`;
        return;
      }
      list.innerHTML = matches.map((m, i) => `
        <div class="match-item">
          <span class="match-rank">${i + 1}</span>
          <div class="match-info">
            <div class="match-name">${esc(m.name || m.sku || m.bead_id)}</div>
            <div class="match-id">${esc(m.sku ?? m.bead_id)}</div>
          </div>
          <div class="match-bar-wrap">
            <div class="match-bar-bg">
              <div class="match-bar-fill" style="width:${Math.round(m.confidence * 100)}%"></div>
            </div>
          </div>
          <div class="match-score">${(m.confidence * 100).toFixed(1)}%</div>
        </div>`).join("");
    }

    // ── Shopify push ───────────────────────────────────────────────────────
    document.getElementById("push-btn").addEventListener("click", async () => {
      const productId = document.getElementById("product-id").value.trim();
      if (!productId) { toast("Enter a Shopify product ID", "err"); return; }
      if (!lastMatches.length) { toast("Run inference first", "err"); return; }

      const btn = document.getElementById("push-btn");
      btn.disabled = true;
      btn.textContent = "Pushing…";

      try {
        const r = await fetch(`${BASE}/shopify/tag`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            product_id: productId,
            bead_ids: lastMatches.map(m => m.sku ?? m.bead_id),
          }),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail ?? r.statusText); }
        const data = await r.json();
        document.getElementById("push-result").textContent = `Tags: ${data.tags}`;
        toast("Shopify tags updated ✓");
      } catch(err) {
        toast(`Shopify error: ${err.message}`, "err");
      } finally {
        btn.disabled = false;
        btn.textContent = "Push tags";
      }
    });

    // ── Train ──────────────────────────────────────────────────────────────
    document.getElementById("train-btn").addEventListener("click", async () => {
      const sku  = document.getElementById("t-sku").value.trim();
      const name = document.getElementById("t-name").value.trim();
      const file = document.getElementById("train-file").files[0];

      if (!sku)  { toast("SKU is required",  "err"); return; }
      if (!name) { toast("Name is required", "err"); return; }
      if (!file && !capturedTrainB64) { toast("Reference image is required", "err"); return; }

      const btn = document.getElementById("train-btn");
      btn.disabled = true;
      btn.textContent = "Saving…";

      try {
        const b64      = file ? await fileToB64(file) : capturedTrainB64;
        const mimeType = file ? (file.type || "image/jpeg") : capturedTrainMime;

        const costRaw   = document.getElementById("t-cost").value.trim();
        const sizeRaw   = document.getElementById("t-size-mm").value.trim();

        const payload = {
          sku,
          name,
          source:            document.getElementById("t-source").value.trim() || null,
          cost:              costRaw   ? parseFloat(costRaw)  : null,
          material_category: document.getElementById("t-material-category").value || null,
          material:          document.getElementById("t-material").value.trim() || null,
          color:             document.getElementById("t-color").value.trim() || null,
          color_family:      document.getElementById("t-color-family").value || null,
          shape:             document.getElementById("t-shape").value || null,
          size_mm:           sizeRaw   ? parseFloat(sizeRaw)  : null,
          finish:            document.getElementById("t-finish").value || null,
          hole_type:         document.getElementById("t-hole-type").value || null,
          tags:              document.getElementById("t-tags").value.split(",").map(s => s.trim()).filter(Boolean),
          focal_bead:        document.getElementById("t-focal-bead").checked,
          focal_subject:     document.getElementById("t-focal-subject").value.trim() || null,
          is_3d:             document.getElementById("t-is-3d").checked,
          focal_description: document.getElementById("t-focal-desc").value.trim() || null,
          image_b64:         b64,
          mime_type:         mimeType,
        };

        const r = await fetch(`${BASE}/add-bead`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail ?? r.statusText); }

        toast(`Bead '${sku}' saved to data lake ✓`);
        // Reset text / number inputs
        ["t-sku","t-name","t-source","t-material","t-color",
         "t-size-mm","t-cost","t-tags","t-focal-subject","t-focal-desc"
        ].forEach(id => { document.getElementById(id).value = ""; });
        // Reset selects
        ["t-material-category","t-color-family","t-shape","t-finish","t-hole-type"
        ].forEach(id => { document.getElementById(id).value = ""; });
        document.getElementById("t-focal-bead").checked = false;
        document.getElementById("t-is-3d").checked = false;
        document.getElementById("focal-extra-fields").style.display = "none";
        document.getElementById("train-file").value = "";
        document.getElementById("train-preview").style.display = "none";
        document.getElementById("train-hint").style.display    = "block";
        capturedTrainB64  = null;
        capturedTrainMime = "image/jpeg";
        checkStatus();
      } catch(err) {
        toast(`Save error: ${err.message}`, "err");
      } finally {
        btn.disabled = false;
        btn.textContent = "Save to data lake";
      }
    });

    // ── Library ────────────────────────────────────────────────────────────
    document.getElementById("refresh-lib").addEventListener("click", refreshLibrary);

    async function refreshLibrary() {
      const body = document.getElementById("lib-body");
      body.innerHTML = `<p class="empty-state">Loading…</p>`;
      try {
        const r = await fetch(`${BASE}/beads`);
        if (!r.ok) throw new Error(r.statusText);
        const beads = await r.json();
        renderLibrary(beads);
      } catch(err) {
        body.innerHTML = `<p class="empty-state" style="color:var(--error)">Error: ${esc(err.message)}</p>`;
      }
    }

    function renderLibrary(beads) {
      const body = document.getElementById("lib-body");
      if (!beads.length) {
        body.innerHTML = `<p class="empty-state">No beads yet. Add some in the Train tab.</p>`;
        return;
      }
      body.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>SKU</th><th>Name</th><th>Attrs</th><th>Refs</th><th></th>
            </tr>
          </thead>
          <tbody>
            ${beads.map(b => {
              const id       = b.sku ?? b.bead_id ?? "";
              const refCount = b.angle_count ?? (b.angles ?? b.embeddings ?? []).length;
              return `
              <tr>
                <td><code style="font-size:0.78rem">${esc(id)}</code></td>
                <td>${esc(b.name)}</td>
                <td>
                  ${b.material_category ? `<span class="pill">${esc(b.material_category)}</span>` : ""}
                  ${b.shape             ? `<span class="pill">${esc(b.shape)}</span>`             : ""}
                  ${b.color_family      ? `<span class="pill">${esc(b.color_family)}</span>`      : (b.color ? `<span class="pill">${esc(b.color)}</span>` : "")}
                  ${b.size_mm != null   ? `<span class="pill">${esc(b.size_mm)}&thinsp;mm</span>` : ""}
                  ${b.finish            ? `<span class="pill">${esc(b.finish)}</span>`            : ""}
                  ${b.focal_bead        ? `<span class="pill" style="border-color:#7c5af0;color:#a78bfa"
                      title="${esc(b.focal_description || '')}">${b.focal_subject ? esc(b.focal_subject) : "focal"}</span>` : ""}
                  ${b.focal_bead && b.is_3d  ? `<span class="pill" style="border-color:#5a8af0;color:#93c5fd">3-D</span>` : ""}
                  ${b.focal_bead && b.is_3d === false ? `<span class="pill" style="border-color:#5aa08a;color:#6ee7b7">2-D</span>` : ""}
                </td>
                <td class="ref-count">${refCount} img${refCount === 1 ? "" : "s"}</td>
                <td>
                  <button class="btn btn-danger" style="font-size:0.78rem;padding:0.3rem 0.6rem"
                    onclick="deleteBead('${esc(id)}', this)">Delete</button>
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>`;
    }

    async function deleteBead(beadId, btn) {
      if (!confirm(`Delete bead '${beadId}'?`)) return;
      btn.disabled = true;
      try {
        const r = await fetch(`${BASE}/beads/${encodeURIComponent(beadId)}`, { method: "DELETE" });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail ?? r.statusText); }
        toast(`'${beadId}' deleted`);
        refreshLibrary();
        checkStatus();
      } catch(err) {
        toast(`Delete failed: ${err.message}`, "err");
        btn.disabled = false;
      }
    }

    // ── Utilities ──────────────────────────────────────────────────────────
    function esc(str) {
      return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function fileToB64(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload  = e => res(e.target.result.split(",")[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
    }
  </script>

</body>
</html>
